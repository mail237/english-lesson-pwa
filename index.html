<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#c2412c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>中学生の英語 — 単語テスト</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/wordtest.css?v=100" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
  </head>
  <body>
    <header class="wt-header">
      <p class="wt-header__label">中学生の英語</p>
      <div class="wt-header__row">
        <h1 class="wt-header__title" id="wt-title">読み込み中です…</h1>
        <button class="wt-header__home" id="wt-home" type="button">
          学年
        </button>
      </div>
    </header>

    <main class="wt-main">
      <div id="wt-root" class="wt-root">
        <p class="wt-loading" id="wt-loading">読み込み中です…</p>
      </div>
    </main>

    <footer class="wt-footer">
      <p>教材データは <code>data/lesson.json</code> で編集できます。</p>
    </footer>

    <script src="js/wordtest.js?v=100" defer></script>
  </body>
</html>
