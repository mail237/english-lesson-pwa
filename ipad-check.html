<!DOCTYPE html>
<html lang="ja">
  <head>

    <title>LAN 接続チェック</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;

      }
      h1 {
        font-size: 1.35rem;

      ここだけ表示されるのにトップが「読み込み中」のままなら、Mac のターミナルで
